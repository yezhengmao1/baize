<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Baize logo">
  <defs>
    <clipPath id="tri">
      <polygon points="120,48 202,192 38,192"/>
    </clipPath>
  </defs>

  <!-- one hard-edged triangle, folded into two facets -->
  <g clip-path="url(#tri)">
    <rect x="20" y="40" width="200" height="160" fill="#2DE1FF"/>
    <rect x="120" y="40" width="100" height="160" fill="#123A8C"/>
    <!-- fold seam -->
    <rect x="119" y="40" width="2" height="160" fill="#0A2A6E" opacity="0.6"/>
  </g>
</svg>
